<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫金港达美 · 数字化管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#060d1a;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,#0a2040 0%,#060d1a 60%),radial-gradient(ellipse at 80% 20%,#001a35 0%,transparent 50%);z-index:0}
.particles{position:fixed;inset:0;z-index:1;pointer-events:none}
.particle{position:absolute;width:2px;height:2px;background:#0089ff;border-radius:50%;opacity:.4;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:.4}90%{opacity:.4}100%{transform:translateY(-100px) translateX(40px);opacity:0}}
.container{position:relative;z-index:10;width:100%;max-width:420px;padding:20px}
.logo-area{text-align:center;margin-bottom:40px}
.logo-icon{width:72px;height:72px;background:linear-gradient(135deg,#0089ff,#00c6ff);border-radius:20px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 40px rgba(0,137,255,.4)}
.logo-title{font-size:22px;font-weight:700;color:#fff;letter-spacing:2px}
.logo-sub{font-size:13px;color:#4a7fa5;margin-top:6px;letter-spacing:1px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(0,137,255,.2);border-radius:16px;padding:32px;backdrop-filter:blur(20px)}
.card-title{font-size:18px;color:#fff;font-weight:600;margin-bottom:24px;text-align:center}
.form-group{margin-bottom:18px}
.form-label{font-size:13px;color:#7ab3cc;margin-bottom:8px;display:block}
.form-input{width:100%;background:rgba(0,137,255,.08);border:1px solid rgba(0,137,255,.25);border-radius:10px;padding:12px 16px;color:#fff;font-size:15px;outline:none;transition:.3s}
.form-input:focus{border-color:#0089ff;background:rgba(0,137,255,.15);box-shadow:0 0 0 3px rgba(0,137,255,.1)}
.form-input::placeholder{color:#3a6080}
.roles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.role-btn{background:rgba(0,137,255,.08);border:1px solid rgba(0,137,255,.2);border-radius:8px;padding:8px;text-align:center;cursor:pointer;transition:.3s;color:#7ab3cc;font-size:12px}
.role-btn.active,.role-btn:hover{background:rgba(0,137,255,.25);border-color:#0089ff;color:#fff}
.login-btn{width:100%;background:linear-gradient(135deg,#0089ff,#0066cc);border:none;border-radius:10px;padding:14px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:.3s;letter-spacing:1px}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,137,255,.4)}
.divider{text-align:center;color:#3a6080;font-size:12px;margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:35%;height:1px;background:rgba(0,137,255,.2)}
.divider::before{left:0}.divider::after{right:0}
.quick-login{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quick-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px;text-align:center;cursor:pointer;color:#7ab3cc;font-size:13px;transition:.3s}
.quick-btn:hover{border-color:rgba(0,137,255,.4);color:#fff}
.footer{text-align:center;margin-top:24px;color:#2a4a60;font-size:12px}
.glow-line{height:1px;background:linear-gradient(90deg,transparent,#0089ff,transparent);margin:20px 0;opacity:.5}
</style>
</head>
<body>
<div class="bg"></div>
<div class="particles" id="particles"></div>
<div class="container">
  <div class="logo-area">
    <div class="logo-icon">🏗️</div>
    <div class="logo-title">紫金港达美</div>
    <div class="logo-sub">数字化项目管理系统 v2.0</div>
  </div>
  <div class="card">
    <div class="card-title">欢迎登录</div>
    <div class="form-group">
      <label class="form-label">账号 / 手机号</label>
      <input class="form-input" type="text" placeholder="请输入账号" id="username" value="admin">
    </div>
    <div class="form-group">
      <label class="form-label">登录密码</label>
      <input class="form-input" type="password" placeholder="请输入密码" id="password" value="••••••••">
    </div>
    <div class="form-group">
      <label class="form-label">选择角色</label>
      <div class="roles">
        <div class="role-btn active" onclick="selectRole(this,'boss')">👔 老板</div>
        <div class="role-btn" onclick="selectRole(this,'pm')">📋 项目经理</div>
        <div class="role-btn" onclick="selectRole(this,'finance')">💰 财务</div>
      </div>
    </div>
    <button class="login-btn" onclick="doLogin()">立即登录</button>
    <div class="divider">或快捷登录</div>
    <div class="quick-login">
      <div class="quick-btn" onclick="quickLogin('pm')">📋 项目经理视角</div>
      <div class="quick-btn" onclick="quickLogin('boss')">📊 老板驾驶舱</div>
    </div>
  </div>
  <div class="footer">深圳紫金港达美装饰工程有限公司 · 内部系统</div>
</div>
<script>
let particles=document.getElementById('particles');
for(let i=0;i<25;i++){let p=document.createElement('div');p.className='particle';p.style.cssText=`left:${Math.random()*100}%;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*10}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;opacity:${.2+Math.random()*.4}`;particles.appendChild(p)}
let selectedRole='boss';
function selectRole(el,role){document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');selectedRole=role}
function doLogin(){window.location.href=selectedRole==='boss'?'boss.html':'dashboard.html'}
function quickLogin(role){selectedRole=role;doLogin()}
</script>
</body>
</html>
